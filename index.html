<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appartement</title>
    <link rel="stylesheet" href="style.css">
    <style>
      /* Cacher la vidéo YouTube mais laisser l'audio jouer */
      .yt-player { width: 0; height: 0; border: 0; position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="container">
        <img id="trollImage" src="Capture d&#39;écran 2026-06-18 120214.png" alt="Troll" class="troll-image">
    </div>
    
    <!-- YouTube player (caché) utilisé pour lire l'audio de la vidéo demandée -->
    <div id="player" class="yt-player"></div>

    <script>
      // ID vidéo YouTube fournie par l'utilisateur
      const YOUTUBE_ID = 'RbASRYyIOac';

      // Chargement de l'API IFrame de YouTube
      let tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);

      let player;
      let pendingPlay = false;

      // Si l'utilisateur clique avant que le player ne soit prêt, on marque pendingPlay
      document.addEventListener('click', function() {
        if (player && typeof player.playVideo === 'function') {
          player.playVideo();
        } else {
          pendingPlay = true;
        }
      }, { once: true });

      function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
          height: '0',
          width: '0',
          videoId: YOUTUBE_ID,
          playerVars: {
            autoplay: 0,
            controls: 0,
            modestbranding: 1,
            rel: 0
          },
          events: {
            'onReady': onPlayerReady
          }
        });
      }

      function onPlayerReady(event) {
        // Si l'utilisateur a déjà cliqué, lancer la lecture maintenant
        if (pendingPlay) {
          player.playVideo();
          pendingPlay = false;
        }
        // Défaut volume à 100
        try { player.setVolume(100); } catch(e) { /* ignore */ }
      }

      // Ajouter un effet de shake à l'image
      const image = document.getElementById('trollImage');
      image.classList.add('shake');
    </script>
</body>
</html>
