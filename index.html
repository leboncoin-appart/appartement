<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appartement</title>
    <link rel="stylesheet" href="style.css">
    <style>
      /* Cacher la vidéo YouTube mais laisser l'audio jouer */
      .yt-player { width: 0; height: 0; border: 0; position: absolute; left: -9999px; }

      /* Slideshow container */
      .slideshow { position: relative; width: 100%; max-width: 720px; height: 480px; margin: 0 auto; overflow: hidden; }
      .slide { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transform: translate3d(0,0,0); }
      .slide.visible { opacity: 1; z-index: 2; }

      /* Lots of movement - entry animations */
      @keyframes inFromLeft {
        from { transform: translateX(-120%) rotate(-30deg) scale(0.8); opacity: 0; }
        to   { transform: translateX(0)      rotate(0deg)    scale(1);   opacity: 1; }
      }
      @keyframes inFromRight {
        from { transform: translateX(120%) rotate(30deg) scale(0.8); opacity: 0; }
        to   { transform: translateX(0)     rotate(0deg)  scale(1);   opacity: 1; }
      }
      @keyframes inFromTop {
        from { transform: translateY(-120%) rotate(-20deg) scale(0.8); opacity: 0; }
        to   { transform: translateY(0)       rotate(0deg)     scale(1);   opacity: 1; }
      }
      @keyframes inFromBottom {
        from { transform: translateY(120%) rotate(20deg) scale(0.8); opacity: 0; }
        to   { transform: translateY(0)     rotate(0deg)  scale(1);   opacity: 1; }
      }
      @keyframes popRotate {
        from { transform: scale(0.6) rotate(-90deg); opacity: 0; }
        60%  { transform: scale(1.08) rotate(18deg); opacity: 1; }
        to   { transform: scale(1) rotate(0deg); opacity: 1; }
      }

      /* Utility classes for animations */
      .anim-left { animation: inFromLeft var(--dur,900ms) cubic-bezier(.2,.8,.2,1) both; }
      .anim-right { animation: inFromRight var(--dur,900ms) cubic-bezier(.2,.8,.2,1) both; }
      .anim-top { animation: inFromTop var(--dur,900ms) cubic-bezier(.2,.8,.2,1) both; }
      .anim-bottom { animation: inFromBottom var(--dur,900ms) cubic-bezier(.2,.8,.2,1) both; }
      .anim-pop { animation: popRotate var(--dur,900ms) cubic-bezier(.2,.8,.2,1) both; }

      /* subtle shadow for depth */
      .slide::after { content: ''; position: absolute; inset: 0; box-shadow: 0 20px 40px rgba(0,0,0,0.4); pointer-events: none; }

      /* container responsiveness */
      @media (max-width: 800px) { .slideshow { height: 60vh; } }

      /* simple controls layout */
      .controls { text-align: center; margin-top: 12px; }
      .controls button { margin: 0 6px; padding: 6px 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Slideshow uses uploaded images present at repo root -->
        <div id="slideshow" class="slideshow" aria-live="polite">
          <img src="45B95E4D-3B24-4420-B488-E9ACE93D4B25.JPG" class="slide" alt="slide 1">
          <img src="IMG_2650.jpeg" class="slide" alt="slide 2">
          <img src="IMG_3762.jpeg" class="slide" alt="slide 3">
          <img src="IMG_4109.PNG" class="slide" alt="slide 4">
          <img src="D40AF55D-05B5-46BD-8CD6-2CFA7E2CACE5.JPG" class="slide" alt="slide 5">
        </div>
    </div>
    
    <!-- YouTube player (caché) utilisé pour lire l'audio de la vidéo demandée -->
    <div id="player" class="yt-player"></div>

    <div class="controls">
      <button id="playBtn">Lecture</button>
      <button id="pauseBtn">Pause</button>
      <label>Volume <input id="volumeSlider" type="range" min="0" max="100" value="100"></label>
    </div>

    <script>
      // ID vidéo YouTube fournie par l'utilisateur
      const YOUTUBE_ID = 'RbASRYyIOac';

      // Chargement de l'API IFrame de YouTube
      let tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);

      let player;
      let pendingPlay = false;

      // Si l'utilisateur clique avant que le player ne soit prêt, on marque pendingPlay
      document.addEventListener('click', function() {
        if (player && typeof player.playVideo === 'function') {
          player.playVideo();
        } else {
          pendingPlay = true;
        }
      }, { once: true });

      function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
          height: '0',
          width: '0',
          videoId: YOUTUBE_ID,
          playerVars: {
            autoplay: 0,
            controls: 0,
            modestbranding: 1,
            rel: 0
          },
          events: {
            'onReady': onPlayerReady
          }
        });
      }

      function onPlayerReady(event) {
        // Si l'utilisateur a déjà cliqué, lancer la lecture maintenant
        if (pendingPlay) {
          player.playVideo();
          pendingPlay = false;
        }
        // Défaut volume à 100
        try { player.setVolume(100); } catch(e) { /* ignore */ }
      }

      // --- Slideshow logic: lots of movement, random entries ---
      (function(){
        const container = document.getElementById('slideshow');
        const slides = Array.from(container.querySelectorAll('.slide'));
        if (!slides.length) return;

        // helper to pick random animation class and duration
        const animClasses = ['anim-left','anim-right','anim-top','anim-bottom','anim-pop'];
        function randomAnim(el){
          // pick a random animation and optionally random duration between 700ms and 1400ms
          const cls = animClasses[Math.floor(Math.random()*animClasses.length)];
          const dur = (700 + Math.floor(Math.random()*800)) + 'ms';
          el.style.setProperty('--dur', dur);
          return cls;
        }

        let current = -1;
        const displayTime = 1600; // time each slide stays visible before next
        const pauseBetween = 300; // slight gap before next anim

        // Preload images to avoid flicker
        slides.forEach(s => { const i = new Image(); i.src = s.src; });

        function showNext(){
          // remove visible class from current
          if (current >= 0) {
            const prev = slides[current];
            prev.classList.remove('visible');
            // clear animation classes
            prev.classList.remove('anim-left','anim-right','anim-top','anim-bottom','anim-pop');
            prev.style.zIndex = 1;
          }
          current = (current + 1) % slides.length;
          const next = slides[current];

          // choose an animation and apply
          const anim = randomAnim(next);
          next.classList.add('visible');
          next.style.zIndex = 3;
          // force reflow then add animation class
          void next.offsetWidth;
          next.classList.add(anim);

          // schedule hiding after displayTime
          setTimeout(()=>{
            // keep visible class for exit, then next will remove it
          }, displayTime);
        }

        // Start the loop
        showNext();
        setInterval(showNext, displayTime + pauseBetween);
      })();

      // UI controls for manual play/pause/volume
      document.getElementById('playBtn').addEventListener('click', ()=>{ if (player) player.playVideo(); });
      document.getElementById('pauseBtn').addEventListener('click', ()=>{ if (player) player.pauseVideo(); });
      document.getElementById('volumeSlider').addEventListener('input', function(){ const vol = parseInt(this.value,10); if (player) player.setVolume(vol); });
    </script>
</body>
</html>
