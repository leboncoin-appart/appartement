<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appartement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img id="trollImage" src="https://media.giphy.com/media/l0HlTy9x8FZo0XO1i/giphy.gif" alt="Troll" class="troll-image">
    </div>
    
    <audio id="scareSound" autoplay>
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
        Votre navigateur ne supporte pas l'audio.
    </audio>

    <script>
        // Lancer le son immédiatement
        window.addEventListener('load', function() {
            const audio = document.getElementById('scareSound');
            audio.volume = 1.0;
            audio.play().catch(function(error) {
                console.log("Autoplay bloqué, cliquez n'importe où pour lancer le son");
                document.addEventListener('click', function() {
                    audio.play();
                }, { once: true });
            });
        });

        // Ajouter un effet de shake à l'image
        const image = document.getElementById('trollImage');
        image.classList.add('shake');
    </script>
</body>
</html>
